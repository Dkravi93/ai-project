services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - API_KEY=${API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-documents}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-384}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentops_hub
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - qdrant
      - postgres
      - mlflow
    volumes:
      - .:/app
    restart: on-failure
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY}

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentops_hub
    volumes:
      - postgres_storage:/var/lib/postgresql/data

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow
    depends_on:
      - postgres
    volumes:
      - mlflow_storage:/mlflow

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_storage:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_storage:/var/lib/grafana
    depends_on:
      - prometheus

  # Streamlit UI
  ui:
    build: .
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=development
      - UI_API_BASE_URL=http://api:8000
      - API_KEY=${API_KEY}
    depends_on:
      - api
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: on-failure
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  qdrant_storage:
  postgres_storage:
  mlflow_storage:
  prometheus_storage:
  grafana_storage:
